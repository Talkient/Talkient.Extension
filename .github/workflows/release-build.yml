name: Generating release + Build Extension

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version-bump:
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.bump-version.outputs.VERSION }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Bump version
        id: bump-version
        run: |
          VERSION=${{ github.event.release.tag_name }}
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            manifest.version = '$VERSION';
            fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, 2) + '\n');
          "
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json manifest.json
          if git diff --cached --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "feat: ${{ steps.bump-version.outputs.VERSION }}"
          fi

      - name: Push changes
        run: git push origin HEAD:main

  build:
    runs-on: ubuntu-latest
    needs: [version-bump]
    if: ${{ always() && (github.event_name != 'release' || needs.version-bump.result == 'success') }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm run publish

      - name: Get version from package.json
        id: package-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version: $VERSION"

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: extension-${{ steps.package-version.outputs.VERSION }}
          path: dist/
