name: Unit Tests for Talkient Extension

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  talkient-extension-unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.11.0

      - name: Install dependencies
        run: pnpm install

      - name: Run unit tests
        run: pnpm test
